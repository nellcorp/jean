name: Build & publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  # Allow manual builds from the Actions tab.
  workflow_dispatch:
  # Build on PRs for validation, but don't push (see `if` on the push step).
  pull_request:
    branches:
      - main

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # ghcr.io uses the repo name as the image name, lowercased.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login for forked-PR builds where GITHUB_TOKEN can't write packages.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags produced:
          #   - `latest` on default branch pushes
          #   - `main`, `main-<sha>` on branch pushes
          #   - semver tags from `vX.Y.Z` git tags (`X.Y.Z`, `X.Y`, `X`)
          #   - `sha-<short sha>` for every build
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=jean
            org.opencontainers.image.description=Jean headless server (fork build)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # amd64 only for now; add linux/arm64 here later if needed.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
